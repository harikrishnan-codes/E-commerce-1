<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E Commerce</title>
    <link rel="icon" href="./assets/bg remove.webp">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./root.css">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>

    <style>
        .error-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }

        .error-container {
            max-width: 600px;
        }

        .animation-wrapper {
            position: relative;
            margin-bottom: 2rem;
        }

        .error-code {
            font-size: 8rem;
            margin: 0;
            opacity: 0.1;
            line-height: 1;
        }

        .shopping-bag {
            width: 80px;
            height: 90px;
            background-color: var(--action-primary);
            border-radius: 4px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: float 3s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shopping-bag::after {
            content: 'S';
            color: var(--bg-main);
            font-weight: 700;
            font-size: 1.5rem;
        }

        .handle {
            width: 40px;
            height: 30px;
            border: 4px solid var(--action-primary);
            border-bottom: none;
            border-radius: 20px 20px 0 0;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(-50%, -50%) translateY(0) rotate(0deg);
            }

            50% {
                transform: translate(-50%, -50%) translateY(-20px) rotate(5deg);
            }
        }

        .error-page h2 {
            color: var(--text-main);
            margin-bottom: 1rem;
        }

        .error-page p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        @media (max-width: 480px) {
            .error-actions {
                flex-direction: column;
            }

            .error-code {
                font-size: 5rem;
            }
        }
    </style>

    <section class="error-page">
        <div class="container error-container">
            <div class="animation-wrapper">
                <div class="shopping-bag">
                    <div class="handle"></div>
                </div>
                <h1 class="error-code">404</h1>
            </div>

            <h2>Oops! This aisle is empty.</h2>
            <p>The product you're looking for might have been moved or is no longer in stock.</p>

            <div class="error-actions">
                <a href="index.html" class="btn btn-primary">Back to Home</a>
            </div>
        </div>
    </section>

</body>

</html>
